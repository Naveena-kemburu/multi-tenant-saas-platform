version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: saas-database
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_password_secure
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - saas_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U saas_user -d saas_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-backend
    environment:
      DATABASE_URL: "postgresql://saas_user:saas_password_secure@database:5432/saas_db"
      JWT_SECRET: "your_super_secret_jwt_key_change_in_production"
      JWT_EXPIRY: "86400"
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - saas_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas-frontend
    environment:
      REACT_APP_API_URL: "http://localhost:5000"
      REACT_APP_API_BASE_URL: "http://backend:5000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - saas_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  saas_network:
    driver: bridge
